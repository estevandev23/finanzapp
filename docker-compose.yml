# =============================================================
# docker-compose.yml — Stack completo de FinanzApp
# =============================================================
# Servicios que levanta este compose:
#
#   1. postgres        — Base de datos PostgreSQL 16
#   2. finanzapp-api   — Backend Spring Boot (API REST + JWT)
#   3. finanzapp-mcp   — Servidor MCP (TypeScript/Node) que
#                        expone herramientas para Claude u otro
#                        asistente conversacional
#
# Uso rápido:
#   cp .env.example .env          # ajusta las variables
#   docker compose up -d --build  # construye y levanta todo
#   docker compose logs -f        # ver logs en tiempo real
#   docker compose down -v        # parar y borrar volúmenes
# =============================================================

# ─────────────────────────────────────────────────────────────
# Variables de entorno con valores por defecto razonables.
# Crea un archivo .env en esta misma carpeta para sobrescribirlas.
# ─────────────────────────────────────────────────────────────

services:

  # ===========================================================
  # 1. PostgreSQL — Capa de persistencia
  # ===========================================================
  # Almacena usuarios, ingresos, gastos, ahorros, metas y
  # dispositivos. La extensión uuid-ossp se habilita mediante
  # el script docker/init-db/01-init.sql; las tablas las crea
  # Hibernate automáticamente (ddl-auto: update).
  # ===========================================================
  postgres:
    image: postgres:16-alpine
    container_name: finanzapp-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: finanzapp
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      # Persistencia de datos entre reinicios
      - postgres_data:/var/lib/postgresql/data
      # Scripts DDL/DML de inicialización (se ejecutan una sola vez)
      - ./finanzapp/docker/init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d finanzapp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - finanzapp-network

  # ===========================================================
  # 2. finanzapp-api — Backend Java/Spring Boot
  # ===========================================================
  # API REST con arquitectura hexagonal que expone:
  #   POST /api/v1/auth/login          → Login email/password
  #   POST /api/v1/auth/login/whatsapp → Login por WhatsApp OTP
  #   POST /api/v1/auth/register       → Registro de usuario
  #   GET/POST /api/v1/ingresos        → Gestión de ingresos
  #   GET/POST /api/v1/gastos          → Gestión de gastos
  #   GET/POST /api/v1/ahorros         → Gestión de ahorros
  #   GET/POST /api/v1/metas           → Metas financieras
  #   GET      /api/v1/balance         → Balance general/por período
  #   GET/POST /api/v1/dispositivos    → Dispositivos WhatsApp
  #   GET      /actuator/health        → Health check
  #   GET      /swagger-ui.html        → Documentación OpenAPI
  #
  # Seguridad: JWT (Bearer token). Todas las rutas excepto
  #   /auth/** requieren Authorization: Bearer <token>.
  # ===========================================================
  finanzapp-api:
    build:
      context: ./finanzapp
      dockerfile: Dockerfile
    container_name: finanzapp-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Puerto del servidor (debe coincidir con EXPOSE y healthcheck)
      SERVER_PORT: 8080
      # Base de datos
      DATABASE_URL: jdbc:postgresql://postgres:5432/finanzapp
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800000}
      # Hibernate
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
      JPA_SHOW_SQL: ${JPA_SHOW_SQL:-false}
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # JVM tuning
      JAVA_OPTS: ${JAVA_OPTS:--Xms256m -Xmx512m}
      # Mail SMTP
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-finanzappstudio@gmail.com}
      # Twilio SMS
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      # Evolution API
      EVOLUTION_API_URL: ${EVOLUTION_API_URL:-http://evolution-api:8080}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-}
      EVOLUTION_INSTANCE_NAME: ${EVOLUTION_INSTANCE_NAME:-finanzapp}
      # Frontend URL
      FRONTEND_URL: ${FRONTEND_URL:-https://finanzappweb.estevanv.dev}
    ports:
      - "${API_PORT}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - finanzapp-network

  # ===========================================================
  # 3. finanzapp-mcp — Servidor MCP (Model Context Protocol)
  # ===========================================================
  # Servidor Node.js/TypeScript que implementa el protocolo MCP
  # y expone herramientas para que Claude (u otro LLM) gestione
  # las finanzas del usuario mediante lenguaje natural.
  #
  # Herramientas disponibles:
  #   crearIngreso / obtenerIngresos / obtenerIngresosPorPeriodo
  #   crearEgreso  / obtenerGastos   / obtenerGastosPorPeriodo
  #                                  / obtenerDesgloseGastos
  #   crearAhorro  / obtenerAhorros
  #   crearMeta    / obtenerMetas    / registrarProgresoMeta
  #   obtenerBalance / obtenerBalancePorPeriodo
  #   obtenerResumenFinanciero / obtenerAnalisisFinanciero
  #
  # Transporte: stdio (el LLM lanza el proceso y se comunica
  # mediante stdin/stdout con mensajes JSON-RPC).
  # En este compose se ejecuta en modo "long-running" para que
  # Docker lo mantenga vivo; el LLM lo invoca externamente.
  #
  # Variables de entorno requeridas:
  #   FINANZAPP_API_URL   → URL del backend (por defecto apunta
  #                         al servicio finanzapp-api interno)
  #   FINANZAPP_JWT_TOKEN → Token JWT del usuario autenticado
  # ===========================================================
  finanzapp-mcp:
    build:
      context: ./finanzapp-mcp
      dockerfile: Dockerfile
    container_name: finanzapp-mcp
    restart: unless-stopped
    depends_on:
      finanzapp-api:
        condition: service_healthy
    environment:
      # Apunta al servicio interno del backend
      FINANZAPP_API_URL: ${FINANZAPP_API_URL:-http://finanzapp-api:8080/api/v1}
      # Token JWT: opcional, se usa solo para Claude Desktop u otros clientes MCP directos.
      # En el flujo WhatsApp/n8n la autenticacion se gestiona por sesiones en la BD.
      FINANZAPP_JWT_TOKEN: ${FINANZAPP_JWT_TOKEN:-}
      # Timeout en ms para las peticiones al backend
      FINANZAPP_TIMEOUT: ${FINANZAPP_TIMEOUT:-30000}
      NODE_ENV: production
      # Transporte: "http" para Streamable HTTP (N8N), omitir para stdio
      MCP_TRANSPORT: ${MCP_TRANSPORT:-http}
      # Puerto del servidor HTTP MCP
      MCP_HTTP_PORT: ${MCP_HTTP_PORT:-3001}
    ports:
      - "${MCP_HTTP_PORT:-3001}:3001"
    command: ["node", "dist/http-server.js"]
    networks:
      - finanzapp-network

  # ===========================================================
  # 4. finanzapp-web — Frontend Next.js
  # ===========================================================
  # Aplicacion web con Next.js 16, Shadcn UI y Tailwind CSS.
  # Interfaz de usuario para gestionar finanzas personales:
  # ingresos, gastos, ahorros, metas y dispositivos WhatsApp.
  #
  # Acceso: http://localhost:3000
  # ===========================================================
  finanzapp-web:
    build:
      context: ./finanzapp-web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
    container_name: finanzapp-web
    restart: unless-stopped
    depends_on:
      finanzapp-api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://finanzappapi.estevanv.dev/api/v1}
      AUTH_URL: ${AUTH_URL:-https://finanzappweb.estevanv.dev}
      AUTH_SECRET: ${NEXTAUTH_SECRET:-cambiar-esto-en-produccion}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
    ports:
      - "${WEB_PORT:-}:3000"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - finanzapp-network

  # ===========================================================
  # 5. n8n— Motor de automatización de flujos de trabajo
  # ===========================================================
  # Orquesta la integración entre WhatsApp (Evolution API),
  # el agente de IA (Claude via Anthropic) y el backend de
  # FinanzApp. Los flujos de trabajo se crean visualmente en
  # la interfaz de n8n y se pueden exportar/importar como JSON.
  #
  # Acceso a la interfaz web: http://localhost:5678
  #
  # Variables de entorno requeridas (configurar en .env):
  #   N8N_ENCRYPTION_KEY    → Clave para cifrar credenciales
  #   N8N_WEBHOOK_URL       → URL pública donde Evolution API
  #                           envía los webhooks
  #   ANTHROPIC_API_KEY     → Clave API de Anthropic/Claude
  # ===========================================================
  n8n:
    image: n8nio/n8n:latest
    container_name: finanzapp-n8n
    restart: unless-stopped
    ports:
      - "${N8N_PORT}:5678"
    environment:
      # Red y acceso
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      # URL pública para que Evolution API alcance el webhook.
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678}
      N8N_EDITOR_BASE_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678}
      # Clave de cifrado para las credenciales guardadas en n8n.
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-cambiar-esto-en-produccion-256bits}
      # Zona horaria para los cron jobs y logs
      GENERIC_TIMEZONE: America/Bogota
      TZ: America/Bogota
      # Desactiva la telemetría para entornos de desarrollo
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
      # Permite acceso a variables de entorno desde expresiones $env en los workflows
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      # Variables de Evolution API accesibles desde los workflows
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_INSTANCE_NAME: ${EVOLUTION_INSTANCE_NAME:-finanzapp}
    volumes:
      # Persistencia de workflows, credenciales y configuración
      - n8n_data:/home/node/.n8n
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      finanzapp-api:
        condition: service_healthy
    networks:
      - finanzapp-network

  # ===========================================================
  # 6. Evolution API — Gateway de WhatsApp
  # ===========================================================
  # Permite conectar WhatsApp Web a n8n para recibir y enviar
  # mensajes. Se conecta via WebSocket a los servidores de
  # WhatsApp y expone una API REST para gestionar instancias,
  # enviar mensajes y configurar webhooks.
  #
  # Acceso a la interfaz: http://localhost:8081
  # Documentación: https://doc.evolution-api.com
  # ===========================================================
  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: evolution-api
    restart: unless-stopped
    ports:
      - "${EVOLUTION_PORT:-8081}:8080"
    environment:
      # Servidor
      SERVER_TYPE: http
      SERVER_PORT: 8080
      SERVER_URL: ${EVOLUTION_SERVER_URL:-https://evolution.estevanv.dev}
      # Autenticación
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      # Base de datos (usa la misma instancia de PostgreSQL)
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/evolution?schema=public
      DATABASE_CONNECTION_CLIENT_NAME: evolution_exchange
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      DATABASE_SAVE_DATA_LABELS: "true"
      DATABASE_SAVE_DATA_HISTORIC: "true"
      DATABASE_SAVE_IS_ON_WHATSAPP: "true"
      DATABASE_SAVE_IS_ON_WHATSAPP_DAYS: "7"
      DATABASE_DELETE_MESSAGE: "true"
      # Cache con Redis
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://evolution-redis:6379/6
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_SAVE_INSTANCES: "false"
      CACHE_LOCAL_ENABLED: "false"
      # QR Code
      QRCODE_LIMIT: "30"
      QRCODE_COLOR: "#175197"
      # Instancias
      DEL_INSTANCE: "false"
      # Sesión WhatsApp
      CONFIG_SESSION_PHONE_CLIENT: FinanzApp
      CONFIG_SESSION_PHONE_NAME: Chrome
      # Logs
      LOG_LEVEL: ERROR,WARN,DEBUG,INFO,LOG,VERBOSE,DARK,WEBHOOKS
      LOG_COLOR: "true"
      LOG_BAILEYS: error
      # CORS
      CORS_ORIGIN: "*"
      CORS_METHODS: "GET,POST,PUT,DELETE"
      CORS_CREDENTIALS: "true"
      # Zona horaria
      TZ: America/Bogota
      # Idioma
      LANGUAGE: en
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      postgres:
        condition: service_healthy
      evolution-redis:
        condition: service_healthy
    networks:
      - finanzapp-network

  # ===========================================================
  # 7. Redis — Cache para Evolution API
  # ===========================================================
  evolution-redis:
    image: redis:7-alpine
    container_name: evolution-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - evolution_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - finanzapp-network

# =============================================================
# Volúmenes con nombre
# =============================================================
volumes:
  postgres_data:
    driver: local
  n8n_data:
    driver: local
  evolution_instances:
    driver: local
  evolution_redis:
    driver: local

# =============================================================
# Red interna compartida por todos los servicios
# =============================================================
networks:
  finanzapp-network:
    driver: bridge

